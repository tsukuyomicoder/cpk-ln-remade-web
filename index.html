<!DOCTYPE html>

    <style>
        /* Đây là nơi viết CSS */
        body {
            font-family: Arial, sans-serif; /* Đổi font chữ cho dễ nhìn */
            text-align: center;            /* Căn giữa toàn bộ nội dung */
            background-color: #f0f0f0;    /* Màu nền xám nhạt */
            padding-top: 50px;
        }

        h1 {
            color: #2c3e50;               /* Màu xanh đen sang trọng */
            text-transform: uppercase;     /* Viết hoa toàn bộ tiêu đề */
        }

        p {
            color: #00ff09;               /* Màu cam nổi bật */
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            background-color: #27ae60;    /* Màu nút xanh lá */
            color: white;
            border: none;
            border-radius: 5px;           /* Bo tròn góc nút */
            cursor: pointer;              /* Hiện bàn tay khi di chuột vào */
        }

        button:hover {
            background-color: #2ecc71;    /* Đổi màu khi di chuột qua */
        }
                /* Tổng thể thanh Navbar */
        .navbar {
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 10px 0;
            
            /* ĐÂY LÀ PHẦN QUAN TRỌNG: Giữ thanh ở trên cùng khi cuộn */
            position: sticky;
            top: 0;
            z-index: 1000; /* Đảm bảo nó luôn nằm trên các nội dung khác */
        }
        
        /* Căn chỉnh các thành phần nằm ngang */
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        
        /* Định dạng Logo */
        .nav-logo a {
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            color: #2c3e50;
        }
        
        /* Định dạng Menu */
        .nav-menu a {
            margin: 0 15px;
            text-decoration: none;
            color: #555;
            font-weight: 500;
        }
        
        /* Định dạng thanh Search */
        .nav-search input {
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
            outline: none;
        }
        
        .nav-search button {
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-left: none;
            background: #f8f9fa;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
        }
        
        /* Nút Đăng nhập/Đăng ký */
        .btn-login {
            background: none;
            border: none;
            color: #3498db;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .btn-register {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-container">

            <div class="nav-search">
                <input type="text" placeholder="Tìm truyện...">
                <button>🔍</button>
            </div>
    
            <div class="nav-auth">
                <button class="btn-login">Đăng nhập</button>
                <button class="btn-register">Đăng ký</button>
            </div>
        </div>
    </header>

<!DOCTYPE html>
<html>
<head>
    <title>ハローーー >.<</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        /* Đây là nơi viết CSS */
        body {
            font-family: Arial, sans-serif; /* Đổi font chữ cho dễ nhìn */
            text-align: center;            /* Căn giữa toàn bộ nội dung */
            background-color: #EAE4D3;    /* Màu nền xám nhạt */
            padding-top: 50px;
        }

        /* Chế độ mặc định (Light Mode) */
        body {
            transition: background-color 0.5s, color 0.5s; /* Hiệu ứng đổi màu mượt mà */
            background-color: #EAE4D3;
            color: black;
        }

        /* Khi body có thêm class "dark-theme" */
        body.dark-theme {
            background-color: #2c3e50;
            color: #ecf0f1;
        }

        h1 {
            color: #0f77de;               /* Màu xanh đen sang trọng */
            text-transform: uppercase;     /* Viết hoa toàn bộ tiêu đề */
        }

        p {
            color: #00ff09;               /* Màu cam nổi bật */
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            background-color: #27ae60;    /* Màu nút xanh lá */
            color: white;
            border: none;
            border-radius: 5px;           /* Bo tròn góc nút */
            cursor: pointer;              /* Hiện bàn tay khi di chuột vào */
        }

        button:hover {
            background-color: #2ecc71;    /* Đổi màu khi di chuột qua */
        }
        
        .muc-luc {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            padding: 20px;
            width: 300px;
            border-radius: 8px;
            margin: 20px auto; /* Căn giữa bảng mục lục */
        }

        .muc-luc h2 {
            text-align: center;
            color: #333;
            font-size: 1.2em;
        }

        .muc-luc ul {
            list-style-type: none; /* Bỏ dấu chấm đầu dòng */
            padding: 0;
        }

        .muc-luc li {
            margin: 10px 0;
            border-bottom: 1px dashed #ccc; /* Tạo đường gạch đứt giữa các dòng */
            padding-bottom: 5px;
        }

        .muc-luc li:last-child {
            border-bottom: none; /* Dòng cuối không cần gạch dưới */
        }

        .muc-luc a {
            text-decoration: none; /* Bỏ gạch chân mặc định của link */
            color: #3498db;        /* Màu xanh dương dễ nhìn */
            font-weight: bold;
            display: block;        /* Giúp cả dòng đều có thể click được */
            transition: 0.3s;
        }

        .muc-luc a:hover {
            color: #2c3e50;        /* Đổi màu khi di chuột vào */
            padding-left: 10px;    /* Hiệu ứng nhích sang phải nhẹ */
        }
                /* Tổng thể thanh Navbar */
        .navbar {
            background-color: rgb(237, 237, 237);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 10px 0;
            
            /* ĐÂY LÀ PHẦN QUAN TRỌNG: Giữ thanh ở trên cùng khi cuộn */
            position: sticky;
            top: 0;
            z-index: 1000; /* Đảm bảo nó luôn nằm trên các nội dung khác */
        }
        
        /* Căn chỉnh các thành phần nằm ngang */
        .nav-container {
            max-width: 1920px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        
        /* Định dạng Logo */
        .nav-logo a {
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            color: #2c3e50;
        }
        
        /* Định dạng Menu */
        .nav-menu a {
            margin: 0 15px;
            text-decoration: none;
            color: #555;
            font-weight: 500;
        }
        
        /* Định dạng thanh Search */
        .nav-search input {
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
            outline: none;
        }
        
        .nav-search button {
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-left: none;
            background: #f8f9fa;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
        }
        
        /* Nút Đăng nhập/Đăng ký */
        .btn-login {
            background: none;
            border: none;
            color: #3498db;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .btn-register {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .novel-card {
            display: flex; /* Kích hoạt Flexbox để nằm ngang */
            background-color: #fff9d7;
            border: 1px solid #000000;
            border-radius: 20px;
            overflow: hidden;
            max-width: 1440px;
            margin: 20px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Phần ảnh bên trái */
        .novel-cover {
            flex: 1; /* Chiếm khoảng 1/3 hoặc tỉ lệ linh hoạt */
            min-width: 250px;
        }

        .novel-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Giúp ảnh không bị méo khi co giãn */
        }

        /* Phần nội dung bên phải */
        .novel-content {
            flex: 2; /* Chiếm phần còn lại (khoảng 2/3) */
            padding: 20px;
            display: flex;
            flex-direction: column; /* Xếp tiêu đề và danh sách chương theo chiều dọc */
            justify-content: space-between; /* Đẩy danh sách chương xuống dưới cùng nếu cần */
        }

        .novel-title {
            margin-top: 0;
            color: #2c3e50;
        }

        .novel-title h2 {
            text-size-adjust: 123;
        }

        .novel-description {
            font-size: 0.9em;
            color: #666;
            line-height: 1.5;
        }

        /* Danh sách chương */
        .novel-chapters {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .novel-chapters h3 {
            font-size: 1em;
            margin-bottom: 10px;
        }

        .novel-chapters ul {
            list-style: none;
            padding: 0;
        }

        .novel-chapters li {
            margin-bottom: 5px;
        }

        .novel-chapters a {
            text-decoration: none;
            color: #3498db;
            font-size: 0.9em;
        }

        .novel-chapters a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<script>
function toggleDarkMode() {
    // Lệnh này sẽ tự động thêm/xóa class "dark-theme" vào thẻ <body>
    document.body.classList.toggle("dark-theme");
}
</script>

<body>
    <header class="navbar">
        <div class="nav-container">

            <nav class="nav-menu">

            <div class="nav-search">

                <button class="btn-register">Đăng ký</button>
            </div>
        </div>
    </header>

    <h1>ハローーーーーー　＝D</h1>

    <div class="novel-card">

        <div class="novel-content">
            <div class="novel-header">
                <h2 class="novel-title">超かぐや姫！</h2>
                <p class="novel-description">Đây là phần mô tả ngắn gọn về nội dung bộ truyện. Bạn có thể viết tóm tắt cốt truyện ở đây...</p>
            </div>
            
            <div class="novel-chapters">
                <h3>Danh sách chương</h3>
                <ul>
                    <li><a href="#">Chương 1: Sự khởi đầu</a></li>
                    <li><a href="#">Chương 2: Cuộc gặp gỡ định mệnh</a></li>
                    <li><a href="#">Chương 3: Sức mạnh thức tỉnh</a></li>
                </ul>
            </div>
        </div>
    </div>
    <button onclick="toggleDarkMode()">Đổi màu nền</button>
</body>
</html>
